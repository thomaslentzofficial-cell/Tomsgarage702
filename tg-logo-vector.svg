<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 390" role="img" aria-label="Tom's Garage logo">
  <defs>
    <filter id="glow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.55 0 0 0 0.25  0 0.05 0 0 0  0.9 0 1 0 0.9  0 0 0 0.85 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity=".65"/>
    </filter>
    <linearGradient id="purple" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b66cff"/>
      <stop offset=".55" stop-color="#7c22db"/>
      <stop offset="1" stop-color="#4a0b9a"/>
    </linearGradient>
  </defs>

  <g filter="url(#glow)">
    <path d="M122 95 L151 45 L177 99 L226 42 L247 104" fill="none" stroke="#7f25dc" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M97 126 C145 106 211 105 277 124" fill="none" stroke="#7f25dc" stroke-width="10" stroke-linecap="round"/>
    <circle cx="151" cy="45" r="10" fill="#7f25dc"/>
    <circle cx="226" cy="42" r="10" fill="#7f25dc"/>
    <circle cx="122" cy="95" r="9" fill="#7f25dc"/>
    <circle cx="247" cy="104" r="9" fill="#7f25dc"/>
  </g>

  <g filter="url(#shadow)">
    <text x="56" y="205"
      font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
      font-size="172"
      font-weight="900"
      font-style="italic"
      letter-spacing="-11"
      transform="skewX(-13)"
      stroke="#191919"
      stroke-width="18"
      paint-order="stroke fill"
      fill="#ffffff">TOM'S</text>

    <text x="58" y="205"
      font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
      font-size="172"
      font-weight="900"
      font-style="italic"
      letter-spacing="-11"
      transform="skewX(-13)"
      stroke="#7c22db"
      stroke-width="7"
      paint-order="stroke fill"
      fill="#ffffff">TOM'S</text>

    <text x="202" y="316"
      font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
      font-size="118"
      font-weight="900"
      font-style="italic"
      letter-spacing="-4"
      transform="skewX(-12)"
      stroke="#161616"
      stroke-width="16"
      paint-order="stroke fill"
      fill="url(#purple)">GARAGE</text>

    <text x="202" y="316"
      font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
      font-size="118"
      font-weight="900"
      font-style="italic"
      letter-spacing="-4"
      transform="skewX(-12)"
      stroke="#6a15c8"
      stroke-width="5"
      paint-order="stroke fill"
      fill="url(#purple)">GARAGE</text>
  </g>

  <g opacity=".92">
    <path d="M18 181 C150 143 273 133 412 145" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
    <path d="M38 202 C178 172 332 169 489 184" fill="none" stroke="#7c22db" stroke-width="8" stroke-linecap="round"/>
    <path d="M385 330 C497 320 628 315 774 326" fill="none" stroke="#7c22db" stroke-width="8" stroke-linecap="round"/>
    <path d="M622 254 C710 224 788 218 889 229" fill="none" stroke="#6a15c8" stroke-width="11" stroke-linecap="round"/>
  </g>

  <text x="333" y="368"
    font-family="Arial, Helvetica, sans-serif"
    font-size="25"
    font-weight="800"
    letter-spacing="8"
    fill="#ffffff">MOBILE EUROPEAN CAR SPECIALIST</text>
</svg>