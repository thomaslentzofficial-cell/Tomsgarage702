<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Inquiry Sent | Tom's Garage</title>
  <meta name="theme-color" content="#050505">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root{--purple:#8a2be2;--purple2:#b666ff;--line:rgba(255,255,255,.13)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 70% 20%,rgba(138,43,226,.32),transparent 35%),#050505;color:white;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;padding:30px}
    .card{max-width:760px;border:1px solid var(--line);background:rgba(10,10,16,.88);border-radius:30px;padding:36px;box-shadow:0 0 50px rgba(138,43,226,.22)}
    img{width:min(360px,90%);display:block;margin:0 0 24px;filter:drop-shadow(0 0 22px rgba(182,102,255,.22))}
    h1{font-size:clamp(38px,8vw,76px);line-height:.9;margin:0;text-transform:uppercase;letter-spacing:-.05em}
    p{color:#d7d7e1;font-size:18px;line-height:1.55}
    a{display:inline-flex;margin-top:14px;background:linear-gradient(135deg,var(--purple),#c071ff);color:white;text-decoration:none;border-radius:999px;padding:14px 20px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <img src="tg-logo-hero-hq.png" alt="Tom's Garage">
    <h1>Inquiry Sent.</h1>
    <p>Thanks for reaching out to Tom's Garage. We received your service request and will get back to you as soon as possible. For urgent scheduling, call or text 725-252-9073.</p>
    <a href="/">Back to the Garage</a>
  </div>
</body>
</html>
